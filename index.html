<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivina el Número</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🎮 ADIVINA EL NÚMERO</h1>
        <p>He pensado un número entre 1 y 100. ¿Crees poder adivinarlo?</p>

        <input type="number" id="numeroInput" placeholder="Escribe un número" min="1" max="100">
        
        <div class="buttons">
            <button id="btnComprobar">COMPROBAR</button>
            <button id="btnReiniciar">REINICIAR JUEGO</button>
        </div>

        <div id="mensaje" class="mensaje">¡Empieza a jugar!</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
